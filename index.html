function verify() {
  let phone = document.getElementById("phone").value.trim();
  let msg = document.getElementById("msg");

  if(students[phone]) {
    document.getElementById("section").style.display = "block";
    document.getElementById("name").value = students[phone];

    msg.innerText = "Verified Successfully ✅";
    msg.className = "ok";
  } else {
    msg.innerText = "Not Eligible ❌";
    msg.className = "error";
  }
}

function generatePDF() {
  let name = document.getElementById("name").value;

  if(name === "") return;

  document.getElementById("loader").style.display = "block";

  const doc = new jsPDF('landscape');

  const images = [
    "cert1.jpg",
    "cert2.jpg",
    "cert3.jpg",
    "cert4.jpg",
    "cert5.jpg"
  ];

  let loaded = 0;
  let imgElements = [];

  images.forEach((src, index) => {
    let img = new Image();
    img.src = src;

    img.onload = function() {
      imgElements[index] = img;
      loaded++;

      if(loaded === images.length) {

        for(let i = 0; i < 5; i++) {

          doc.addImage(imgElements[i], 'JPEG', 0, 0, 297, 210);

          doc.setFont("Courier", "bold");
          doc.setFontSize(30);

          const textWidth = doc.getTextWidth(name);
          const x = (297 - textWidth) / 2;
          const y = 124;

          doc.text(name, x, y);

          if(i < 4) doc.addPage();
        }

        doc.save(name + "_certificates.pdf");

        document.getElementById("loader").style.display = "none";
      }
    }
  });
}
